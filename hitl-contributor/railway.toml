[build]
dockerfile = "docker/Dockerfile.app"

[deploy]
startCommand = "python web_server.py"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "web"
startCommand = "python web_server.py"

[[services]]
name = "scheduler"
startCommand = "python scheduler.py"
