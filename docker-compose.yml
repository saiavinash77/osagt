version: "3.9"

# ─────────────────────────────────────────────────
# HITL Contributor Agent - Full Stack
# Usage:
#   docker-compose up --build
#
# Services:
#   agent-web   — FastAPI + Web UI on port 8000
#   agent-scheduler — Background scheduler (every 6h)
# ─────────────────────────────────────────────────

services:

  # ── Web UI & API ───────────────────────────────
  agent-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: hitl-agent-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs          # persist logs
      - /var/run/docker.sock:/var/run/docker.sock   # allow Docker-in-Docker for sandbox
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: python web_server.py

  # ── Background Scheduler ───────────────────────
  agent-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: hitl-agent-scheduler
    env_file:
      - .env
    environment:
      - AUTO_RUN=true
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - agent-web
    command: python scheduler.py

volumes:
  logs:
